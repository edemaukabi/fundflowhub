<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Teal circle base -->
  <circle cx="20" cy="20" r="20" fill="#00BFA5"/>

  <!-- Dashed circulation ring — suggests money cycle/flow -->
  <circle cx="20" cy="20" r="16.5" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.4" stroke-dasharray="2.2 2.8"/>

  <!-- House body — filled, clean -->
  <path d="M10.5 21.5L20 13.5L29.5 21.5V30.5C29.5 31.05 29.05 31.5 28.5 31.5H11.5C10.95 31.5 10.5 31.05 10.5 30.5V21.5Z" fill="white" fill-opacity="0.96"/>

  <!-- Roofline accent -->
  <path d="M9 22.5L20 13L31 22.5" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Rising trend line inside house — money growth / finance signal -->
  <polyline points="13,28.5 16.5,25.5 19.5,27 23.5,23" fill="none" stroke="#00BFA5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="23.5" cy="23" r="1.8" fill="#00BFA5"/>

  <!-- Circular flow badge top-right — money circulation indicator -->
  <circle cx="29.5" cy="11.5" r="5.2" fill="#1B2F5B"/>
  <circle cx="29.5" cy="11.5" r="5.2" fill="none" stroke="rgba(0,191,165,0.5)" stroke-width="1"/>
  <!-- Circular arrows: two arcs forming a cycle -->
  <path d="M27.5 9.5 A3 3 0 0 1 32 11.5" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M31.5 13.5 A3 3 0 0 1 27 11.5" fill="none" stroke="#00BFA5" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Arrowhead top arc -->
  <path d="M31.5 9.2 L32.2 11.2 L30.2 11" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead bottom arc -->
  <path d="M27.5 13.8 L26.8 11.8 L28.8 12" fill="none" stroke="#00BFA5" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
